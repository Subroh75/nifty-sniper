name: Nifty Sniper Auto-Sync
on:
  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    env:
      # This line stops the "Node.js 20 is deprecated" warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install gspread oauth2client yfinance pandas
        
      - name: Execute Sniper Engine
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GSHEET_NAME: ${{ secrets.GSHEET_NAME }}
        run: python morning_sync.py

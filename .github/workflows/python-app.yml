name: Nifty Sniper Auto-Sync
on:
  schedule:
    - cron: '45 3 * * 1-5'  # 03:45 UTC is 09:15 AM IST, Monday-Friday
  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated to v6 for Node 24 support
      
      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install gspread oauth2client yfinance pandas
        
      - name: Execute Sniper Engine
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GSHEET_NAME: ${{ secrets.GSHEET_NAME }}
        run: python morning_sync.py
